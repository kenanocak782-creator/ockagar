<!DOCTYPE html>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Bu ayar siteyi ekranın dışına taşırıp o kutuyu Dell'in ekranına zorla yayar */
        iframe {
            position: absolute;
            top: -25%; 
            left: -25%;

            border: none;

            transform-origin: center;
        }
    </style>
</head>
