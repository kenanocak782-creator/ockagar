<!DOCTYPE html>
<html>
<head>
    <title>OCK AGAR - KRAL MODU</title>
    <style>
        /* Ekranın her yerini oyuna zorla açıyoruz */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Bu ayar o kırmızı kutuyu ekranına yayacak */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            object-fit: cover; /* Görüntüyü ekrana yayar */
        }
    </style>
</head>
<body>
    <iframe src="https://tr.agar.live"></iframe>
</body>
</html>
