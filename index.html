<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>OCK AGAR - RADAR</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        /* Kutu kıran ayar: Siteyi ekranın 1.5 katı büyüklükte zorluyoruz */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 150vw; 
            height: 150vh;
            border: none;
            transform: translate(-50%, -50%) scale(0.67);
            transform-origin: center;
        }
    </style>
</head>
<body>
    <iframe id="gameFrame" src="https://tr.agar.live"></iframe>
    
    <script>
        // Bu küçük kod parçası o kırmızı kutuyu (Canvas) bulup genişletmeye çalışır
        var frame = document.getElementById('gameFrame');
        setInterval(function() {
            try {
                var canvas = frame.contentWindow.document.querySelector('canvas');
                if (canvas) {
                    canvas.style.width = '100%';
                    canvas.style.height = '100%';
                }
            } catch(e) {}
        }, 1000);
    </script>
</body>
</html>
