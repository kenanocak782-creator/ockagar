<!DOCTYPE html>
<html>
<head>
    <title>OCK AGAR - FULL RADAR</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        /* Bu ayar o kırmızı kutuyu ekranın her köşesine çiviler */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="game" src="https://tr.agar.live"></iframe>

    <script>
        // Site açıldığında içindeki o dar kutuyu (canvas) bulup genişleten bomba
        var frame = document.getElementById('game');
        setInterval(function() {
            try {
                var canvas = frame.contentWindow.document.querySelector('canvas');
                if (canvas) {
                    canvas.style.width = '100vw';
                    canvas.style.height = '100vh';
                    canvas.style.maxWidth = 'none';
                    canvas.style.maxHeight = 'none';
                }
            } catch(e) {}
        }, 500);
    </script>
</body>
</html>
