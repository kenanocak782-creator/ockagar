<!DOCTYPE html>
<html>
<head>
    <title>OCK AGAR - RADAR MODU</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* Modlu siteyi ekranın 2 katı büyüklükte açıp kamerayı yukarı çekiyoruz */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vw; 
            height: 200vh;
            border: none;
            /* %50 ölçeğe düşürerek devasa haritayı ekrana sığdırıyoruz */
            transform: translate(-50%, -50%) scale(0.5); 
            transform-origin: center;
        }
    </style>
</head>
<body>
    <iframe src="https://4justice404.github.io/"></iframe>
</body>
</html>
